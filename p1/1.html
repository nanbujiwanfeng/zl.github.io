<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前端登录演示</title>
    <style>
        body {
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }
        h2 {
            margin-bottom: 1.5rem;
            color: #1e293b;
        }
        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 0.25rem;
            color: #475569;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            transition: border 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        button {
            width: 100%;
            padding: 0.7rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover {
            background: #2563eb;
        }
        .message {
            margin-top: 1rem;
            padding: 0.5rem;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>用户登录</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="input-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit">登录</button>
        </form>
        <!-- 消息显示区域 -->
        <div id="message" class="message"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // 阻止表单提交（避免刷新页面）

            // 获取用户名和密码（去除首尾空格）
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            // 硬编码的账号密码
            const validCredential = '123456';

            const messageDiv = document.getElementById('message');
            if (username === validCredential && password === validCredential) {
                // 登录成功：显示成功消息，可在此处跳转或执行其他操作
                messageDiv.textContent = '登录成功！欢迎回来。';
                messageDiv.className = 'message success';
                // 可选：登录成功后跳转到其他页面，如 location.href = 'home.html';
            } else {
                // 登录失败
                messageDiv.textContent = '用户名或密码错误，请重试。';
                messageDiv.className = 'message error';
            }
        });
    </script>
</body>
</html>
